name = "Private fællesveje (Ramhøj 2016)"
output_dir = 'Y:\Mit drev\Learning\LE34\Bøger_og_artikler\Private_faellesveje_Ramhoej_2016'
source_photos = 'C:\Users\thc\Pictures\01-07-2026_billeder_Ramhøj Privatvejsloven'
source_glob = "*.JPG"
split_spreads = true
voice = "da-DK-JeppeNeural"

# Kapitler detekteres ikke automatisk (OCR-støj gør det upålideligt) — grænserne
# er fundet manuelt (kør 'detect' og juster). page = sideindeks i pages_hq/.
detect = "manual"

# Brødtekst slutter side 240; 241+ = domsregister/forkortelser/stikord.
body_end = 241

# Udtale-hints — KUN til MP3 (tekstfilen forbliver korrekt dansk). "vejret" er en
# ret til en vej og skal udtales "vej-ret", ikke som vejr-fænomenet. \b-prefix
# fanger hele familien: vejret, vejretten, vejrettens, vejrettigheder, ...
[[tts_pronounce]]
pattern = '\bvejret'
repl = 'vej-ret'
[[tts_pronounce]]
pattern = '\bVejret'
repl = 'Vej-ret'

